<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MealHub Amethyst Login</title>

<!-- --- PROGRESSIVE WEB APP (PWA) AND HOME SCREEN CONFIGURATIONS --- -->
<link rel="manifest" href="manifest.json">

<!-- iOS Fullscreen App Engine (Removes Safari Search & Navigation Bar) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MealHub">

<!-- Android / Chrome Theme System Integration -->
<meta name="theme-color" content="#08060c">
<meta name="mobile-web-app-capable" content="yes">

<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  :root {
    /* Liquid Glass - Amethyst Premium (Dark) */
    --bg-gradient: radial-gradient(circle at 50% 0%, #1a1528 0%, #08060c 100%);
    --glass-bg: rgba(22, 18, 33, 0.6);
    --glass-bg-hover: rgba(33, 27, 49, 0.75);
    --glass-border: rgba(255, 255, 255, 0.05);
    --glass-specular: rgba(255, 255, 255, 0.12);
    --text: #fdfcff;
    --text-muted: #8b8599;
    --accent: #a855f7;
    --accent-hover: #c084fc;
    --accent-gradient: linear-gradient(180deg, #c084fc 0%, #7c3aed 100%);
    --accent-glass: rgba(168, 85, 247, 0.15);
    --error: #ff5277;
    --success: #34d399;
    --shadow-dark: rgba(0, 0, 0, 0.6);
    --shadow-light: rgba(255, 255, 255, 0.01);
  }

  :root.light {
    /* Liquid Glass - Orchid Crystal (Light) */
    --bg-gradient: linear-gradient(135deg, #f7f5fa 0%, #e8e4f0 100%);
    --glass-bg: rgba(255, 255, 255, 0.5);
    --glass-bg-hover: rgba(255, 255, 255, 0.75);
    --glass-border: rgba(124, 58, 237, 0.06);
    --glass-specular: rgba(255, 255, 255, 0.7);
    --text: #1f1a29;
    --text-muted: #787285;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
    --accent-gradient: linear-gradient(180deg, #9333ea 0%, #6d28d9 100%);
    --accent-glass: rgba(124, 58, 237, 0.08);
    --error: #df2c56;
    --success: #059669;
    --shadow-dark: rgba(40, 30, 60, 0.06);
    --shadow-light: rgba(255, 255, 255, 0.6);
  }

  html {
    /* Fills the status-bar gap on iOS PWA black-translucent mode */
    background: #08060c;
    height: 100%;
  }
  :root.light ~ * html,
  html:has(.light) {
    background: #e8e4f0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-tap-highlight-color: transparent;
    /* Respect notch and home indicator */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* Vibrant fluid background blooms */
  .bg-blob {
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(0,0,0,0) 70%);
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
    filter: blur(50px);
    transition: all 0.8s ease;
  }
  .blob-1 { top: 10%; left: -5%; }
  .blob-2 { bottom: 10%; right: -5%; }

  .app-container {
    width: 100%;
    max-width: 430px;
    height: 100dvh;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px;
    z-index: 1;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.6s ease;
    will-change: transform, filter;
  }
  
  /* Sinks the main dashboard panel beautifully behind the glass veil when PIN is requested */
  .app-container.recede {
    transform: scale(0.92) translateY(10px);
    filter: blur(4px) brightness(0.7);
  }

  /* Glass Base Engine */
  .glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(190%);
    -webkit-backdrop-filter: blur(24px) saturate(190%);
    border: 1px solid var(--glass-border);
    border-top: 1px solid var(--glass-specular);
    box-shadow: 0 10px 40px var(--shadow-dark), inset 0 1px 1px var(--shadow-light);
    border-radius: 30px;
    padding: 32px;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform, opacity;
  }

  .action-header {
    position: absolute;
    top: 24px; left: 24px; right: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }

  .circle-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    border-top: 1px solid var(--glass-specular);
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .circle-btn:active { transform: scale(0.9); }
  .circle-btn:hover { background: var(--glass-bg-hover); }

  .lang-toggle {
    display: flex;
    background: var(--glass-bg);
    border-radius: 24px;
    padding: 3px;
    border: 1px solid var(--glass-border);
  }
  .lang-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .lang-btn.active {
    background: var(--glass-specular);
    color: var(--text);
    box-shadow: 0 2px 8px var(--shadow-dark);
  }

  /* Typography Design */
  .logo-area { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid var(--glass-border);
    border-top: 1px solid var(--glass-specular);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 24px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .app-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(180deg, var(--text) 30%, var(--text-muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .app-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

  /* Fluid Validation Input Elements */
  .form-group { margin-bottom: 20px; position: relative; }
  .form-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .input-wrapper { position: relative; width: 100%; }
  .form-input {
    width: 100%;
    padding: 16px 48px 16px 18px;
    border-radius: 16px;
    border: 1px solid var(--glass-border);
    background: rgba(0, 0, 0, 0.15);
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  :root.light .form-input { background: rgba(255, 255, 255, 0.45); }
  .form-input:focus {
    border-color: var(--accent);
    background: rgba(0, 0, 0, 0.25);
    box-shadow: 0 0 0 4px var(--accent-glass);
  }
  :root.light .form-input:focus { background: rgba(255, 255, 255, 0.85); }
  
  .input-action {
    position: absolute;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }
  .input-action:hover { color: var(--text); }

  /* Dynamic Password Validation Rule Sub-drawer */
  .password-requirements {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 0;
    padding-left: 4px;
  }
  .password-requirements.visible {
    max-height: 120px;
    opacity: 1;
    margin-top: 12px;
    margin-bottom: 8px;
  }
  .req-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
    transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .req-item::before {
    content: '○';
    font-weight: bold;
    color: var(--text-muted);
    transition: all 0.3s ease;
  }
  .req-item.valid { color: var(--success); }
  .req-item.valid::before { content: '✓'; color: var(--success); transform: scale(1.1); }

  /* Notification Alerts */
  .alert-banner {
    background: rgba(255, 82, 119, 0.1);
    border: 1px solid rgba(255, 82, 119, 0.2);
    color: var(--error);
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    transform: translateY(-10px);
    opacity: 0;
    visibility: hidden;
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    margin-bottom: 0;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .alert-banner.show { 
    opacity: 1; 
    visibility: visible;
    transform: translateY(0); 
    max-height: 60px;
    padding: 12px 16px;
    margin-bottom: 18px;
  }

  /* Pure Liquid Amethyst Primary Button */
  .login-btn {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    background: var(--accent-gradient);
    color: #ffffff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    box-shadow: 0 8px 25px rgba(124, 58, 237, 0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .login-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 200%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: all 0.6s ease;
  }
  .login-btn:hover::before { left: 100%; }
  .login-btn:hover {
    filter: brightness(1.08);
    box-shadow: 0 12px 30px rgba(124, 58, 237, 0.4);
    transform: translateY(-1px);
  }
  .login-btn:active { transform: translateY(1px) scale(0.98); }

  /* --- ADVANCED CRYSTAL-PIN OVERLAY ANIMATIONS --- */
  .pin-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5, 3, 8, 0.0);
    backdrop-filter: blur(0px) saturate(100%);
    -webkit-backdrop-filter: blur(0px) saturate(100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: background 0.5s cubic-bezier(0.32, 0.94, 0.6, 1), 
                backdrop-filter 0.5s cubic-bezier(0.32, 0.94, 0.6, 1), 
                opacity 0.4s cubic-bezier(0.32, 0.94, 0.6, 1),
                visibility 0.4s cubic-bezier(0.32, 0.94, 0.6, 1);
    will-change: background, backdrop-filter, opacity;
  }
  :root.light .pin-overlay { background: rgba(240, 235, 245, 0.0); }
  
  /* Active Liquid Blur State */
  .pin-overlay.show { 
    opacity: 1; 
    visibility: visible;
    pointer-events: auto;
    background: rgba(5, 3, 8, 0.45);
    backdrop-filter: blur(30px) saturate(210%);
    -webkit-backdrop-filter: blur(30px) saturate(210%);
  }
  :root.light .pin-overlay.show { background: rgba(240, 235, 245, 0.45); }

  .pin-card {
    width: 90%; max-width: 360px; text-align: center;
    transform: translateY(-60px) scale(0.85); /* Premium drop-down with subtle squeeze */
    opacity: 0;
    transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1), 
                opacity 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform, opacity;
  }
  .pin-overlay.show .pin-card { 
    transform: translateY(0) scale(1); 
    opacity: 1;
  }
  
  /* Dynamic exit sequence code */
  .pin-overlay.dismissing {
    visibility: visible;
    pointer-events: none;
    background: rgba(5, 3, 8, 0.0);
    backdrop-filter: blur(0px) saturate(100%);
    -webkit-backdrop-filter: blur(0px) saturate(100%);
    opacity: 0;
  }
  .pin-overlay.dismissing .pin-card {
    transform: translateY(40px) scale(0.92); /* Clean fluid exit downwards */
    opacity: 0;
  }

  .pin-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .pin-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
  
  .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 32px; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: rgba(0, 0, 0, 0.2);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  :root.light .pin-dot { background: rgba(255, 255, 255, 0.6); }
  .pin-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.2);
    box-shadow: 0 0 14px var(--accent);
  }

  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .pin-key {
    padding: 16px 0; border-radius: 18px;
    border: 1px solid var(--glass-border);
    border-top: 1px solid var(--glass-specular);
    background: rgba(255, 255, 255, 0.02);
    color: var(--text); font-size: 24px; font-weight: 500;
    cursor: pointer; transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  }
  :root.light .pin-key { background: rgba(0, 0, 0, 0.01); }
  .pin-key:hover { background: rgba(255, 255, 255, 0.06); }
  .pin-key:active {
    background: var(--text);
    color: rgba(22, 18, 33, 1);
    transform: scale(0.9);
  }
  .pin-key.delete { font-size: 18px; color: var(--text-muted); }
  .pin-error { color: var(--error); font-size: 13px; margin-top: 18px; height: 20px; opacity: 0; font-weight: 500; }
  .pin-error.show { opacity: 1; }

  /* Loader Engine */
  .loading-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-gradient);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .loading-screen.show { 
    opacity: 1; 
    visibility: visible;
    pointer-events: auto;
  }
  .loading-glass { padding: 40px 48px; text-align: center; }
  .loading-greeting { font-size: 30px; font-weight: 700; margin-bottom: 12px; opacity: 0; transform: translateY(15px); animation: fadeInUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
  .loading-text { font-size: 15px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 6px; opacity: 0; animation: fadeInUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards; }
  .loading-dots { display: flex; gap: 4px; }
  .loading-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: liquidBounce 1.4s infinite ease-in-out; }
  .loading-dot:nth-child(1) { animation-delay: 0s; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes liquidBounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); filter: brightness(1.2); } }
  @keyframes fluidShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  .shake { animation: fluidShake 0.35s ease-in-out; }
</style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<div class="app-container" id="appViewport">
  <div class="action-header">
    <button class="circle-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="id" onclick="setLang('id')">ID</button>
    </div>
  </div>

  <div class="glass-panel" id="mainCard">
    <div class="logo-area">
      <div class="logo-icon">🍽️</div>
      <div class="app-title" data-i18n="appTitle">MealHub</div>
      <div class="app-subtitle" data-i18n="appSubtitle">Your daily meal companion</div>
    </div>

    <!-- Live System Alert Banners -->
    <div class="alert-banner" id="capsAlert">⚠️ Caps Lock is ON</div>
    <div class="alert-banner" id="logicAlert">❌ User identity validation error</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" data-i18n="usernameLabel">Username</label>
        <div class="input-wrapper">
          <input type="text" class="form-input" id="username" placeholder="Enter username" autocomplete="off" autocapitalize="none" oninput="validateUsername()">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">
          <span data-i18n="passwordLabel">Password</span>
        </label>
        <div class="input-wrapper">
          <input type="password" class="form-input" id="password" placeholder="Enter password" oninput="handlePasswordInput(event)" onkeyup="checkCaps(event)">
          <button type="button" class="input-action" onclick="togglePasswordVisibility(event)">👁️</button>
        </div>

        <!-- Custom Interactive Rule Drawer -->
        <div class="password-requirements" id="passReqs">
          <div class="req-item" id="reqLength">Min 6 characters</div>
          <div class="req-item" id="reqNum">At least one number</div>
        </div>
      </div>
      
      <button type="submit" class="login-btn" data-i18n="loginBtn">Sign In</button>
    </form>
  </div>
</div>

<div class="pin-overlay" id="pinOverlay">
  <div class="glass-panel pin-card">
    <div class="pin-title" data-i18n="pinTitle">Enter PIN</div>
    <div class="pin-subtitle" data-i18n="pinSubtitle">Please enter your 6-digit security code</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key" style="visibility:hidden; pointer-events:none;"></button>
      <button class="pin-key" onclick="pinInput('0')">0</button>
      <button class="pin-key delete" onclick="pinDelete()">⌫</button>
    </div>
    <div class="pin-error" id="pinError" data-i18n="pinError">Incorrect PIN. Please try again.</div>
  </div>
</div>

<div class="loading-screen" id="loadingScreen">
  <div class="glass-panel loading-glass">
    <div class="loading-greeting" id="loadingGreeting">Hi, User</div>
    <div class="loading-text">
      <span data-i18n="loadingText">Getting your workspace ready</span>
      <div class="loading-dots">
        <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
      </div>
    </div>
  </div>
</div>

<script>
const i18n = {
  en: {
    appTitle: "MealHub", appSubtitle: "Your daily meal companion",
    usernameLabel: "Username", passwordLabel: "Password", loginBtn: "Sign In",
    pinTitle: "Enter PIN", pinSubtitle: "Please enter your 6-digit security code",
    pinError: "Incorrect PIN. Please try again.", loadingText: "Getting your workspace ready"
  },
  id: {
    appTitle: "MealHub", appSubtitle: "Teman makan harian Anda",
    usernameLabel: "Nama Pengguna", passwordLabel: "Kata Sandi", loginBtn: "Masuk",
    pinTitle: "Masukkan PIN", pinSubtitle: "Silakan masukkan kode keamanan 6 digit",
    pinError: "PIN salah. Silakan coba lagi.", loadingText: "Menyiapkan ruang kerja Anda"
  }
};

let currentLang = 'en', currentRole = '', currentUsername = '', pinValue = '', expectedPin = '';

function toggleTheme() {
  const root = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const isLight = root.classList.toggle('light');
  btn.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

function loadTheme() {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('themeToggle').textContent = '☀️';
  }
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
}

function loadLang() {
  const saved = localStorage.getItem('lang');
  if (saved && i18n[saved]) setLang(saved);
}

function validateUsername() {
  const user = document.getElementById('username').value.trim();
  const alertBox = document.getElementById('logicAlert');
  if(user.length > 0) {
    alertBox.classList.remove('show');
  }
}

function handlePasswordInput(e) {
  const val = e.target.value;
  const drawer = document.getElementById('passReqs');
  
  if(val.length > 0) {
    drawer.classList.add('visible');
  } else {
    drawer.classList.remove('visible');
  }

  document.getElementById('reqLength').classList.toggle('valid', val.length >= 6);
  document.getElementById('reqNum').classList.toggle('valid', /\D*\d/.test(val));
}

function checkCaps(e) {
  const capsAlert = document.getElementById('capsAlert');
  if (e.getModifierState && e.getModifierState('CapsLock')) {
    capsAlert.classList.add('show');
  } else {
    capsAlert.classList.remove('show');
  }
}

function togglePasswordVisibility(e) {
  const input = document.getElementById('password');
  const btn = e.currentTarget;
  if(input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

function handleLogin(e) {
  e.preventDefault();
  const userEl = document.getElementById('username');
  const passEl = document.getElementById('password');
  const user = userEl.value.trim().toLowerCase();
  const pass = passEl.value;
  const alertBox = document.getElementById('logicAlert');

  if (!user || pass.length < 6 || !/\D*\d/.test(pass)) {
    shakeElement(document.getElementById('mainCard'));
    alertBox.textContent = "❌ Please complete all standard security fields correctly.";
    alertBox.classList.add('show');
    return;
  }

  currentUsername = userEl.value.trim();

  // ROUTING BACKEND ENGINE (Modified to redirect any general input into user.html)
  if (user === 'worker') {
    currentRole = 'worker'; expectedPin = '456456';
    showPinOverlay();
  } else if (user === 'owner') {
    currentRole = 'owner'; expectedPin = '123789';
    showPinOverlay();
  } else {
    // Catch-all: Any custom username typed drops straight into user setup rules
    currentRole = 'user';
    showLoading();
  }
}

function shakeElement(el) {
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 360);
}

/* Morphing Display Routines */
function showPinOverlay() {
  pinValue = ''; updatePinDots();
  document.getElementById('pinError').classList.remove('show');
  
  const viewport = document.getElementById('appViewport');
  const overlay = document.getElementById('pinOverlay');
  
  // Recede background viewport smoothly
  viewport.classList.add('recede');
  
  setTimeout(() => overlay.classList.add('show'), 20);
}

function hidePinOverlay() {
  const viewport = document.getElementById('appViewport');
  const overlay = document.getElementById('pinOverlay');
  
  overlay.classList.remove('show');
  overlay.classList.add('dismissing');
  viewport.classList.remove('recede');
  
  setTimeout(() => {
    overlay.classList.remove('dismissing');
    pinValue = ''; updatePinDots();
  }, 500);
}

function pinInput(digit) {
  if (pinValue.length < 6) {
    pinValue += digit; updatePinDots();
    if (pinValue.length === 6) setTimeout(checkPin, 250);
  }
}

function pinDelete() {
  if(pinValue.length > 0) {
    pinValue = pinValue.slice(0, -1); updatePinDots();
    document.getElementById('pinError').classList.remove('show');
  }
}

function updatePinDots() {
  document.querySelectorAll('.pin-dot').forEach((dot, i) => dot.classList.toggle('filled', i < pinValue.length));
}

function checkPin() {
  if (pinValue === expectedPin) {
    hidePinOverlay();
    setTimeout(showLoading, 550);
  } else {
    shakeElement(document.querySelector('.pin-card'));
    document.getElementById('pinError').classList.add('show');
    setTimeout(() => { pinValue = ''; updatePinDots(); }, 200);
  }
}

function showLoading() {
  const screen = document.getElementById('loadingScreen');
  document.getElementById('loadingGreeting').textContent = `Hi, ${currentUsername}`;
  setTimeout(() => screen.classList.add('show'), 10);

  setTimeout(() => {
    let target = currentRole === 'user' ? 'user.html' : currentRole === 'worker' ? 'worker.html' : 'owner.html';
    localStorage.setItem('role', currentRole);
    localStorage.setItem('username', currentUsername);

    // ---- IFRAME SHELL: stay on index.html so PWA standalone mode is never broken ----
    const frame = document.getElementById('appFrame');
    frame.src = target;
    frame.style.visibility = 'visible';
    frame.style.opacity = '1';
    // Hide the loading screen once iframe is ready
    frame.onload = () => {
      screen.classList.remove('show');
    };
  }, 2200);
}

document.addEventListener('DOMContentLoaded', () => { loadTheme(); loadLang(); });

document.addEventListener('keydown', (e) => {
  const overlay = document.getElementById('pinOverlay');
  if (overlay.style.display === 'flex' && overlay.classList.contains('show')) {
    if (e.key >= '0' && e.key <= '9') pinInput(e.key);
    if (e.key === 'Backspace') pinDelete();
    if (e.key === 'Escape') hidePinOverlay();
  }
});
</script>

<!-- Full-screen iframe that loads user/worker/owner pages without leaving index.html.
     This keeps the PWA in standalone mode — no browser chrome ever appears. -->
<iframe
  id="appFrame"
  style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%; height: 100%;
    border: none;
    z-index: 999;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.4s ease;
    background: #08060c;
  "
  allow="camera; microphone"
></iframe>

</body>
</html>
