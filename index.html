<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MealHub - Secure Gateway</title>

    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MealHub">
    
    <meta name="theme-color" content="#08060c">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* --- CORE DESIGN SYSTEM DESIGN TOKENS --- */
        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a1528 0%, #08060c 100%);
            --glass-bg: rgba(22, 18, 33, 0.6);
            --glass-border: rgba(168, 85, 247, 0.15);
            --glass-specular: rgba(255, 255, 255, 0.08);
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --card-shadow: rgba(0, 0, 0, 0.5);
            
            --spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);
            --fluid-easing: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 24px;
        }

        /* --- THE VIEWPORT WRAPPER MATRIX --- */
        .viewport-wrapper {
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
            position: relative;
        }

        /* --- STAGE A: GLASS LOGIN CARD CONTAINER --- */
        .login-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-specular);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 50px var(--card-shadow);
            backdrop-filter: blur(24px) saturate(190%);
            -webkit-backdrop-filter: blur(24px) saturate(190%);
            text-align: center;
            transition: transform 500ms var(--spring-easing), filter 500ms ease, opacity 500ms ease;
            transform-style: preserve-3d;
        }

        /* Fluid recession state when PIN security layer pulls forward */
        .login-container.recede {
            transform: scale(0.92) translateY(12px);
            filter: blur(5px) brightness(0.6);
            pointer-events: none;
        }

        /* Branding Signatures elements */
        .brand-logo {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            box-shadow: 0 8px 24px var(--accent-glow);
            margin: 0 auto 16px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h2 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* --- UI FORM CONTROLS INTERFACES --- */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field-wrapper svg {
            position: absolute;
            left: 16px;
            width: 18px;
            height: 18px;
            fill: var(--text-muted);
            transition: fill 300ms ease;
        }

        .glass-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px 16px 16px 48px;
            border-radius: 16px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            user-select: text;
            transition: all 300ms ease;
        }

        .glass-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 16px rgba(168, 85, 247, 0.15);
        }

        .glass-input:focus + svg {
            fill: var(--accent);
        }

        /* Real-Time Password Requirements Drawer elements panel */
        .req-drawer {
            max-height: 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            margin-top: 0;
            transition: max-height 400ms var(--fluid-easing), margin 400ms var(--fluid-easing);
            padding: 0 16px;
        }

        .req-drawer.open {
            max-height: 100px;
            margin-top: 8px;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .req-line {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .req-line:last-child { margin-bottom: 0; }

        .req-line svg {
            width: 12px;
            height: 12px;
            fill: #ef4444;
            transition: fill 300ms ease;
        }

        .req-line.valid { color: var(--text-main); }
        .req-line.valid svg { fill: #22c55e; }

        /* Dynamic Caps Lock Warning Bar */
        .caps-warning {
            display: none;
            font-size: 12px;
            color: #ef4444;
            font-weight: 600;
            margin-top: 6px;
            text-align: left;
            padding-left: 4px;
        }

        .action-submit-btn {
            width: 100%;
            background: var(--accent);
            border: none;
            outline: none;
            padding: 16px;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px var(--accent-glow);
            transition: transform 150ms ease, background 300ms ease;
            margin-top: 12px;
        }

        .action-submit-btn:active {
            transform: scale(0.97);
        }

        /* --- STAGE B: DROP DOWN LIQUID GLASS SECURITY PIN OVERLAY --- */
        .pin-overlay-card {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(28, 22, 43, 0.75);
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-top: 1px solid rgba(255,255,255,0.15);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(32px) saturate(210%);
            -webkit-backdrop-filter: blur(32px) saturate(210%);
            text-align: center;
            z-index: 10;
            
            /* Hidden by default high above viewport top bounds frame layer */
            transform: translateY(-120%) scale(0.95);
            opacity: 0;
            pointer-events: none;
            transition: transform 550ms var(--spring-easing), opacity 450ms ease;
        }

        .pin-overlay-card.open {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        /* Vibrational Error Shake Animations sequence logic */
        @keyframes fluidShake {
            0%, 100% { transform: translateY(0) translateX(0); }
            20%, 60% { transform: translateY(0) translateX(-10px); }
            40%, 80% { transform: translateY(0) translateX(10px); }
        }

        .pin-overlay-card.shake-error {
            animation: fluidShake 400ms ease;
            border-color: #ef4444;
        }

        .pin-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .pin-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Tracking Dots Entry Node Clusters */
        .pin-dots-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            background: transparent;
            transition: all 200ms ease;
        }

        .dot.filled {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            transform: scale(1.15);
        }

        /* Precision Matrix Grid Keyboard Layout */
        .pin-matrix-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 280px;
            margin: 0 auto;
        }

        .matrix-key {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            width: 64px;
            height: 64px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
            transition: background 150ms ease, transform 150ms var(--spring-easing);
        }

        .matrix-key:active {
            background: var(--accent);
            color: white;
            transform: scale(0.88);
            box-shadow: 0 0 14px var(--accent-glow);
        }

        .matrix-key.functional-key {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: transparent;
            border: none;
        }
        .matrix-key.functional-key:active {
            background: rgba(255,255,255,0.05);
            color: white;
            box-shadow: none;
        }

        /* --- STAGE C: THE FULL OVERLAY INTERMEDIATE LOADING MASK --- */
        .loading-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #08060c;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 400ms ease, visibility 400ms ease;
        }

        .loading-mask.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner-ring {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(168, 85, 247, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: cyclicSpin 800ms linear infinite;
        }

        @keyframes cyclicSpin {
            to { transform: rotate(360deg); }
        }

        .loading-txt {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: -0.2px;
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        
        <div class="login-container" id="login-panel-card">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm10-6h-4v7h4V3zm0 12h-4v7h4v-7z"/></svg>
            </div>
            <h2>Welcome back</h2>
            <p class="subtitle">Securely log into your MealHub dashboard ecosystem</p>

            <form id="gateway-form-element" onsubmit="evaluateIdentityGateway(event)">
                <div class="input-group">
                    <label>Identity Handle / Name</label>
                    <div class="input-field-wrapper">
                        <input type="text" id="username-field" class="glass-input" placeholder="Enter 'owner', 'worker', or name..." autocomplete="off" required>
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
                    </div>
                </div>

                <div class="input-group">
                    <label>Access Key Password</label>
                    <div class="input-field-wrapper">
                        <input type="password" id="password-field" class="glass-input" placeholder="••••••••" required>
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    </div>
                    <div class="caps-warning" id="caps-lock-banner">⚠️ Caps Lock is active</div>
                    
                    <div class="req-drawer" id="password-validation-drawer">
                        <div class="req-line" id="req-len">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            <span>At least 4 characters long</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="action-submit-btn">Continue</button>
            </form>
        </div>

        <div class="pin-overlay-card" id="pin-verification-layer">
            <h3 class="pin-title" id="pin-dynamic-header">Verification Required</h3>
            <p class="pin-subtitle">Enter your 6-digit cryptographic clearance token</p>
            
            <div class="pin-dots-row">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="pin-matrix-grid">
                <div class="matrix-key" onclick="appendPinDigit(1)">1</div>
                <div class="matrix-key" onclick="appendPinDigit(2)">2</div>
                <div class="matrix-key" onclick="appendPinDigit(3)">3</div>
                <div class="matrix-key" onclick="appendPinDigit(4)">4</div>
                <div class="matrix-key" onclick="appendPinDigit(5)">5</div>
                <div class="matrix-key" onclick="appendPinDigit(6)">6</div>
                <div class="matrix-key" onclick="appendPinDigit(7)">7</div>
                <div class="matrix-key" onclick="appendPinDigit(8)\">8</div>
                <div class="matrix-key" onclick="appendPinDigit(9)">9</div>
                <div class="matrix-key functional-key" onclick="purgeLastPinDigit()">Clear</div>
                <div class="matrix-key" onclick="appendPinDigit(0)">0</div>
                <div class="matrix-key functional-key" onclick="abortPinOverlaySequence()">Cancel</div>
            </div>
        </div>

    </div>

    <div class="loading-mask" id="global-processing-curtain">
        <div class="spinner-ring"></div>
        <div class="loading-txt" id="global-loading-string">Initializing Secure Pipeline...</div>
    </div>


    <script>
        let parsedActiveRole = "";
        let parsedActiveUser = "";
        let activePinBuffer = "";
        
        // Static Master Token Security Registers
        const SecurityRegistry = {
            owner: "123789",
            worker: "456456"
        };

        window.addEventListener("DOMContentLoaded", () => {
            initializeRealtimeInputListeners();
        });

        // --- HARDWARE REAL-TIME PASSWORDS MONITORS HANDLERS ---
        function initializeRealtimeInputListeners() {
            const passField = document.getElementById("password-field");
            const reqDrawer = document.getElementById("password-validation-drawer");
            const reqLen = document.getElementById("req-len");
            const capsBanner = document.getElementById("caps-lock-banner");

            // Tracks focused requirements unfolding UI triggers
            passField.addEventListener("focus", () => reqDrawer.classList.add("open"));
            passField.addEventListener("blur", () => {
                if(passField.value.length === 0) reqDrawer.classList.remove("open");
            });

            // Evaluation processing of password string criteria items
            passField.addEventListener("input", () => {
                const val = passField.value;
                const matchesLength = val.length >= 4;
                reqLen.classList.toggle("valid", matchesLength);
            });

            // Active OS Level hardware warning listeners mapping for CapsLock alerts
            passField.addEventListener("keydown", (e) => {
                if (e.getModifierState && e.getModifierState("CapsLock")) {
                    capsBanner.style.display = "block";
                } else {
                    capsBanner.style.display = "none";
                }
            });
        }

        // --- IDENTITY ROUTING MATRIX CONTROL ENTRY POINT ---
        function evaluateIdentityGateway(event) {
            event.preventDefault();
            
            const nameInput = document.getElementById("username-field").value.trim();
            const passValue = document.getElementById("password-field").value;
            const normalizedHandle = nameInput.toLowerCase();

            // Guard rails on minimal length validation parameters
            if(passValue.length < 4) {
                const passField = document.getElementById("password-field");
                passField.style.borderColor = "#ef4444";
                setTimeout(() => passField.style.borderColor = "var(--glass-border)", 1000);
                return;
            }

            parsedActiveUser = nameInput;

            // EVALUATING ROLE ROUTING PATHWAYS
            if (normalizedHandle === "owner") {
                parsedActiveRole = "owner";
                instantiatePinOverlaySequence("Management Authentication");
            } 
            else if (normalizedHandle === "worker") {
                parsedActiveRole = "worker";
                instantiatePinOverlaySequence("Operations Authentication");
            } 
            else {
                // THE CATCH-ALL LOGIC ROUTE FOR ALL GENERAL USERS
                parsedActiveRole = "user";
                executeDirectWorkspaceRouting("user.html");
            }
        }

        // --- PIN LAYER INTERACTIVE MOTION DRIVERS ---
        function instantiatePinOverlaySequence(headerTextString) {
            activePinBuffer = "";
            refreshPinDotsDisplayGrid();
            
            document.getElementById("pin-dynamic-header").innerText = headerTextString;
            document.getElementById("login-panel-card").classList.add("recede");
            document.getElementById("pin-verification-layer").classList.add("open");
        }

        function abortPinOverlaySequence() {
            document.getElementById("pin-verification-layer").classList.remove("open");
            document.getElementById("login-panel-card").classList.remove("recede");
            activePinBuffer = "";
        }

        function appendPinDigit(numberInt) {
            if(activePinBuffer.length >= 6) return;
            
            activePinBuffer += numberInt;
            refreshPinDotsDisplayGrid();

            // Terminal evaluation loop reached maximum string bounds check
            if(activePinBuffer.length === 6) {
                setTimeout(evaluateCryptographicToken, 250);
            }
        }

        function purgeLastPinDigit() {
            if(activePinBuffer.length === 0) return;
            activePinBuffer = activePinBuffer.slice(0, -1);
            refreshPinDotsDisplayGrid();
        }

        function refreshPinDotsDisplayGrid() {
            const dots = document.querySelectorAll(".pin-dots-row .dot");
            dots.forEach((dotNode, idx) => {
                dotNode.classList.toggle("filled", idx < activePinBuffer.length);
            });
        }

        // --- VALIDATION LAYER METRICS RUNTIMES ---
        function evaluateCryptographicToken() {
            const targetToken = SecurityRegistry[parsedActiveRole];
            
            if(activePinBuffer === targetToken) {
                // SUCCESS MATCH OUTCOME
                document.getElementById("pin-verification-layer").classList.remove("open");
                executeDirectWorkspaceRouting(`${parsedActiveRole}.html`);
            } else {
                // FAILURE MISMATCH ERROR HANDLING EXCEPTION
                const pinCard = document.getElementById("pin-verification-layer");
                pinCard.classList.add("shake-error");
                
                activePinBuffer = "";
                setTimeout(() => {
                    pinCard.classList.remove("shake-error");
                    refreshPinDotsDisplayGrid();
                }, 400);
            }
        }

        // --- ENGINE WORKSPACE STATE AND ROUTING FORWARDERS ---
        function executeDirectWorkspaceRouting(destinationTargetHtmlFile) {
            // Write payload states safely to browser transaction caches pipelines
            localStorage.setItem("username", parsedActiveUser);
            localStorage.setItem("role", parsedActiveRole);

            const curtain = document.getElementById("global-processing-curtain");
            const loadingText = document.getElementById("global-loading-string");
            
            // Adjust loading string text dynamically based on profile identity attributes
            if(parsedActiveRole === 'user') {
                loadingText.innerText = `Hi ${parsedActiveUser}, parsing workspace rules...`;
            } else {
                loadingText.innerText = `Token authorized. Loading Admin Matrix...`;
            }

            // Launch hardware-accelerated viewport overlays and dispatch route window targets
            curtain.classList.add("active");

            setTimeout(() => {
                window.location.href = destinationTargetHtmlFile;
            }, 1200);
        }
    </script>
</body>
</html>
